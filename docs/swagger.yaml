host: localhost:9000
info:
  contact: {}
  description: listmonk mailing list manager REST API.
  title: listmonk API
  version: "1.0"
paths:
  /api/about:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cmd.about'
      summary: Get application info
      tags:
      - settings
  /api/admin/reload:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/cmd.okResp'
            - properties:
                data:
                  type: boolean
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/echo.HTTPError'
      summary: Reload the application
      tags:
      - settings
  /api/bounces:
    delete:
      parameters:
      - description: Delete all bounces
        in: query
        name: all
        type: boolean
      - collectionFormat: csv
        description: Bounce IDs to delete
        in: query
        items:
          type: integer
        name: id
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/cmd.okResp'
            - properties:
                data:
                  type: boolean
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/echo.HTTPError'
      summary: Delete bounce records
      tags:
      - bounces
    get:
      parameters:
      - description: Filter by campaign ID
        in: query
        name: campaign_id
        type: integer
      - description: Filter by bounce source
        in: query
        name: source
        type: string
      - description: Field to order results by
        in: query
        name: order_by
