info:
  contact: {}
  description: listmonk mailing list manager REST API.
  title: listmonk API
  version: "1.0"
paths:
  /api/about:
    get:
      operationId: getAboutInfo
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/About'
      summary: Get application info
      tags:
      - settings
  /api/admin/reload:
    post:
      operationId: reloadApp
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/echo.HTTPError'
      summary: Reload the application
      tags:
      - settings
  /api/bounces:
    delete:
      operationId: deleteBounces
      parameters:
      - description: Delete all bounces
        in: query
        name: all
        type: boolean
      - collectionFormat: csv
        description: Bounce IDs to delete
        in: query
        items:
          type: integer
        name: id
        type: array
      produces:
      - application/json
