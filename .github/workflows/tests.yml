name: Tests

on:
  push:
    branches:
      - master
      - "feature/**"
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Go unit tests
  # ──────────────────────────────────────────────────────────────────────────
  go-tests:
    name: Go tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: listmonk
          POSTGRES_PASSWORD: listmonk
          POSTGRES_DB: listmonk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U listmonk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: make test
        env:
          LISTMONK_db__host: localhost
          LISTMONK_db__port: 5432
          LISTMONK_db__user: listmonk
          LISTMONK_db__password: listmonk
          LISTMONK_db__database: listmonk

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend lint
  # ──────────────────────────────────────────────────────────────────────────
  # NOTE: vue-tsc type checking is not yet enforced here — there are ~120
  # pre-existing type errors from the JS→TS migration that need to be resolved
  # first. Add `yarn vue-tsc --noEmit` once those are fixed.
  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: yarn lint

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend unit tests (Vitest)
  # ──────────────────────────────────────────────────────────────────────────
  frontend-unit:
    name: Frontend unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Run unit tests with coverage
        working-directory: frontend
        run: yarn test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: frontend/coverage/
          retention-days: 7
