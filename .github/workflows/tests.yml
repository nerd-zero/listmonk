name: Tests

on:
  push:
    branches:
      - master
      - "feature/**"
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Go unit tests
  # ──────────────────────────────────────────────────────────────────────────
  go-tests:
    name: Go tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: listmonk
          POSTGRES_PASSWORD: listmonk
          POSTGRES_DB: listmonk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U listmonk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Load schema
        # The postgres service above starts with an empty database - tests
        # like internal/core/tenant_test.go connect successfully (so they
        # don't hit the "no reachable database" skip) but then fail because
        # tables such as `tenants` don't exist yet.
        run: PGPASSWORD=listmonk psql -h localhost -U listmonk -d listmonk -f schema.sql

      - name: Run tests
        run: make test
        env:
          LISTMONK_db__host: localhost
          LISTMONK_db__port: 5432
          LISTMONK_db__user: listmonk
          LISTMONK_db__password: listmonk
          LISTMONK_db__database: listmonk

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend build + lint + unit tests
  # ──────────────────────────────────────────────────────────────────────────
  # NOTE: vue-tsc type checking is not yet enforced here — there are ~120
  # pre-existing type errors from the JS→TS migration that need to be resolved
  # first. Add `yarn vue-tsc --noEmit` once those are fixed.
  frontend:
    name: Frontend (${{ matrix.step }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        step: [build, lint, unit]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Generate API client
        working-directory: frontend
        run: yarn gen:api

      - name: Build
        if: matrix.step == 'build'
        working-directory: frontend
        run: yarn build

      - name: Lint
        if: matrix.step == 'lint'
        working-directory: frontend
        run: yarn lint

      - name: Unit tests
        if: matrix.step == 'unit'
        working-directory: frontend
        run: yarn test:coverage

      - name: Upload coverage report
        if: matrix.step == 'unit'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: frontend/coverage/
          retention-days: 7
