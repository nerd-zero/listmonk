name: Build and Push

on:
  push:
    branches:
      - main
      - prod
  workflow_dispatch: {}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set_variables.outputs.APP_VERSION }}
      api_image: ${{ steps.set_variables.outputs.API_IMAGE }}
      web_image: ${{ steps.set_variables.outputs.WEB_IMAGE }}
    steps:
      - uses: actions/checkout@v4

      - id: set_variables
        name: Set variables
        run: |
          VER=$(cat VERSION | tr -d '[:space:]')
          BRANCH="${{ github.ref_name }}"

          # prod ships the bare CalVer tag; every other branch (just main,
          # for now -- uat is coming later) gets an -alpha suffix so alpha
          # and prod images are never confused for one another.
          if [[ "$BRANCH" == "prod" ]]; then
            TAG="$VER"
          else
            TAG="${VER}-alpha"
          fi

          echo "APP_VERSION=${TAG}" >> $GITHUB_OUTPUT
          echo "API_IMAGE=ghcr.io/nerd-zero/listnun-api:${TAG}" >> $GITHUB_OUTPUT
          echo "WEB_IMAGE=ghcr.io/nerd-zero/listnun-web:${TAG}" >> $GITHUB_OUTPUT

  publish:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build \
            --build-arg "APP_VERSION=${{ needs.prepare.outputs.version }}" \
            --tag "${{ needs.prepare.outputs.api_image }}" \
            .
          docker push "${{ needs.prepare.outputs.api_image }}"

      - name: Set web OIDC build args
        id: web_oidc
        run: |
          # prod branch must bake in prod's own Zitadel instance (id.listnun.app)
          # and app.listnun.app callback -- everything else (main/alpha builds)
          # keeps pointing at dev. These are compile-time Vite env vars baked
          # into the static JS bundle, not runtime container env vars, so
          # getting this branch wrong ships a build that silently calls back
          # to the wrong environment (found live: a prod pod running an
          # alpha-built image had https://dev.listnun.app hardcoded in its
          # bundle).
          if [[ "${{ github.ref_name }}" == "prod" ]]; then
            echo "AUTHORITY=https://id.listnun.app" >> "$GITHUB_OUTPUT"
            echo "CLIENT_ID=382171781189861870" >> "$GITHUB_OUTPUT"
            echo "REDIRECT_URI=https://app.listnun.app/auth/callback" >> "$GITHUB_OUTPUT"
            echo "POST_LOGOUT_REDIRECT_URI=https://app.listnun.app" >> "$GITHUB_OUTPUT"
          else
            echo "AUTHORITY=https://id.nerdzero.rocks" >> "$GITHUB_OUTPUT"
            echo "CLIENT_ID=381629669008539928" >> "$GITHUB_OUTPUT"
            echo "REDIRECT_URI=https://dev.listnun.app/auth/callback" >> "$GITHUB_OUTPUT"
            echo "POST_LOGOUT_REDIRECT_URI=https://dev.listnun.app" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push web image
        run: |
          docker build \
            --build-arg "APP_VERSION=${{ needs.prepare.outputs.version }}" \
            --build-arg "VITE_OIDC_AUTHORITY=${{ steps.web_oidc.outputs.AUTHORITY }}" \
            --build-arg "VITE_OIDC_CLIENT_ID=${{ steps.web_oidc.outputs.CLIENT_ID }}" \
            --build-arg "VITE_OIDC_REDIRECT_URI=${{ steps.web_oidc.outputs.REDIRECT_URI }}" \
            --build-arg "VITE_OIDC_POST_LOGOUT_REDIRECT_URI=${{ steps.web_oidc.outputs.POST_LOGOUT_REDIRECT_URI }}" \
            --build-arg "VITE_API_BASE_URL=/api" \
            --tag "${{ needs.prepare.outputs.web_image }}" \
            web/
          docker push "${{ needs.prepare.outputs.web_image }}"
