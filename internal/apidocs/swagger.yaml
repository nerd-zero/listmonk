basePath: /api
definitions:
  AdminInstanceDetailResponse:
    properties:
      data:
        $ref: '#/definitions/httpapi.adminInstanceDetail'
    type: object
  AdminInstanceListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/db.ListAllInstancesWithOrgNameRow'
        type: array
    type: object
  AdminOrgListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/db.ListAllOrgsWithInstanceCountRow'
        type: array
    type: object
  CustomDomainDetail:
    properties:
      custom_domain:
        $ref: '#/definitions/db.CustomDomain'
      dns_records:
        items:
          $ref: '#/definitions/db.DnsRecord'
        type: array
    type: object
  CustomDomainResponse:
    properties:
      data:
        $ref: '#/definitions/CustomDomainDetail'
    type: object
  ErrorResponse:
    properties:
      error:
        type: string
    type: object
  HealthResponse:
    properties:
      data:
        properties:
          status:
            type: string
        type: object
    type: object
  InstanceListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/db.Instance'
        type: array
    type: object
  InstanceResponse:
    properties:
      data:
        $ref: '#/definitions/db.Instance'
    type: object
  MemberListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/db.ListOrgMembersWithUserRow'
        type: array
    type: object
  OrgListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/db.ListOrgsByUserRow'
        type: array
    type: object
  OrgResponse:
    properties:
      data:
        $ref: '#/definitions/db.Org'
    type: object
  PostmarkServerResponse:
    properties:
      data:
        $ref: '#/definitions/provisioning.PostmarkServerDetail'
    type: object
  ProvisioningJobListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/db.ProvisioningJob'
        type: array
    type: object
  SenderIdentityDetail:
    properties:
      dns_records:
        items:
          $ref: '#/definitions/db.DnsRecord'
        type: array
      identity:
        $ref: '#/definitions/db.SenderIdentity'
    type: object
  SenderIdentityResponse:
    properties:
      data:
        $ref: '#/definitions/SenderIdentityDetail'
    type: object
  SetupLinkResponse:
    properties:
      data:
        properties:
          setup_url:
            type: string
        type: object
    type: object
  TenantResponse:
    properties:
      data:
        $ref: '#/definitions/operatorclient.Tenant'
    type: object
  UserResponse:
    properties:
      data:
        $ref: '#/definitions/db.User'
    type: object
  db.CustomDomain:
    properties:
      cloudflare_hostname_id:
        type: string
      created_at:
        type: string
      domain:
        type: string
      id:
        type: string
      instance_id:
        type: string
      status:
        type: string
    type: object
  db.DnsRecord:
    properties:
      created_at:
        type: string
      host:
        type: string
      id:
        type: string
      instance_id:
        type: string
      record_type:
        type: string
      value:
        type: string
      verified:
        type: boolean
    type: object
  db.Instance:
    properties:
      admin_email:
        type: string
      admin_setup_url:
        type: string
      admin_username:
        type: string
      created_at:
        type: string
      id:
        type: string
      listmonk_tenant_id:
        type: integer
      name:
        type: string
      org_id:
        type: string
      slug:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  db.ListAllInstancesWithOrgNameRow:
    properties:
      admin_email:
        type: string
      admin_setup_url:
        type: string
      admin_username:
        type: string
      created_at:
        type: string
      id:
        type: string
      listmonk_tenant_id:
        type: integer
      name:
        type: string
      org_id:
        type: string
      org_name:
        type: string
      slug:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  db.ListAllOrgsWithInstanceCountRow:
    properties:
      created_at:
        type: string
      id:
        type: string
      instance_count:
        type: integer
      listmonk_organization_id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  db.ListOrgMembersWithUserRow:
    properties:
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      id:
        type: string
      role:
        type: string
    type: object
  db.ListOrgsByUserRow:
    properties:
      created_at:
        type: string
      id:
        type: string
      listmonk_organization_id:
        type: integer
      name:
        type: string
      role:
        type: string
      updated_at:
        type: string
    type: object
  db.Org:
    properties:
      created_at:
        type: string
      id:
        type: string
      listmonk_organization_id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  db.ProvisioningJob:
    properties:
      attempts:
        type: integer
      created_at:
        type: string
      id:
        type: string
      instance_id:
        type: string
      job_type:
        type: string
      last_error:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  db.SenderIdentity:
    properties:
      created_at:
        type: string
      id:
        type: string
      instance_id:
        type: string
      kind:
        type: string
      postmark_id:
        type: string
      status:
        type: string
      value:
        type: string
    type: object
  db.User:
    properties:
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      id:
        type: string
      is_super_admin:
        type: boolean
      updated_at:
        type: string
      zitadel_subject:
        type: string
    type: object
  httpapi.addCustomDomainRequest:
    properties:
      domain:
        description: |-
          Domain is the bare host the instance should be reachable at (e.g.
          "mail.acme.com"), instead of only {slug}.{root_domain}.
        type: string
    type: object
  httpapi.addSenderIdentityRequest:
    properties:
      kind:
        description: |-
          Kind selects which Postmark identity to add: "domain" (an org's own
          sending domain, needs DKIM published), "sender_signature" (single
          address, confirmed by clicking Postmark's own email -- no DNS), or
          "platform_domain" (a subdomain of ours, for an org with no domain of
          their own -- no value needed, it's derived from the instance's slug).
        type: string
      name:
        description: |-
          Name is only used for kind "sender_signature" -- the display name
          Postmark shows alongside that address.
        type: string
      value:
        description: |-
          Value is the domain name for kind "domain", or the From email
          address for kind "sender_signature". Unused for "platform_domain".
        type: string
    type: object
  httpapi.adminInstanceDetail:
    properties:
      instance: {}
      listmonk_tenant: {}
    type: object
  httpapi.adminSetStatusRequest:
    properties:
      status:
        type: string
    type: object
  httpapi.createInstanceRequest:
    properties:
      admin_email:
        type: string
      admin_username:
        type: string
      include_postmark:
        description: |-
          IncludePostmark defaults to true (a nil pointer, i.e. the field
          omitted) so a caller that predates this field keeps getting the old
          always-on behavior -- only an explicit `false` opts out.
        type: boolean
      name:
        type: string
      slug:
        type: string
    type: object
  httpapi.createOrgRequest:
    properties:
      name:
        type: string
    type: object
  httpapi.inviteMemberRequest:
    properties:
      display_name:
        type: string
      email:
        type: string
      role:
        type: string
    type: object
  operatorclient.Tenant:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      slug:
        type: string
      status:
        description: active | suspended | disabled
        type: string
      updated_at:
        type: string
    type: object
  provisioning.PostmarkServerDetail:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      postmark_id:
        type: string
      smtp_api_activated:
        type: boolean
    type: object
info:
  contact: {}
  description: Orgs and the listmonk-tenant instances each org owns. See docs/plan.md
    for architecture.
  title: listnun API
  version: "1.0"
paths:
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/HealthResponse'
      summary: Health check
      tags:
      - health
  /v1/admin/instances:
    get:
      description: Super-admin only. Bypasses org membership; includes each instance's
        org name.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/AdminInstanceListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: Not a super admin
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: List every instance on the platform
      tags:
      - admin
  /v1/admin/instances/{instanceID}:
    delete:
      description: Super-admin only. Permanently deletes the instance's Postmark server,
        its Cloudflare custom domain (if any), its listmonk tenant (cascading into
        all of the tenant's own data), and the local record. Irreversible.
      parameters:
      - description: Instance ID
        in: path
        name: instanceID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: Not a super admin
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete an instance (super admin)
      tags:
      - admin
    get:
      description: Merges listnun's own provisioning status with the tenant's live
        status/counts straight from listmonk -- two different dimensions, see provisioning.AdminGetTenantLiveStatus's
        doc comment.
      parameters:
      - description: Instance ID
        in: path
        name: instanceID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/AdminInstanceDetailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: Not a super admin
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get instance detail (super admin)
      tags:
      - admin
  /v1/admin/instances/{instanceID}/postmark-server:
    delete:
      description: Super-admin only. Removes the Postmark server without touching
        the instance/tenant itself -- the instance is left without email sending until
        re-provisioned. Irreversible.
      parameters:
      - description: Instance ID
        in: path
        name: instanceID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: Not a super admin
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Instance has no Postmark server
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete an instance's Postmark server (super admin)
      tags:
      - admin
  /v1/admin/instances/{instanceID}/setup-link:
    post:
      description: Same as the org-scoped resend-setup-link endpoint, without the
        org-membership requirement.
      parameters:
      - description: Instance ID
        in: path
        name: instanceID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/SetupLinkResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: Not a super admin
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Reissue any instance's setup link (super admin)
      tags:
      - admin
  /v1/admin/instances/{instanceID}/status:
    put:
      consumes:
      - application/json
      description: Super-admin only. Writes directly to listmonk; deliberately not
        mirrored into instances.status (a different dimension -- provisioning state
        vs. account lifecycle).
      parameters:
      - description: Instance ID
        in: path
        name: instanceID
        required: true
        type: string
      - description: New status
        in: body
        name: status
        required: true
        schema:
          $ref: '#/definitions/httpapi.adminSetStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/TenantResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: Not a super admin
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Suspend, reactivate, or disable a tenant
      tags:
      - admin
  /v1/admin/orgs:
    get:
      description: Super-admin only. Bypasses org membership.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/AdminOrgListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: Not a super admin
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: List every org on the platform
      tags:
      - admin
  /v1/me:
    get:
      description: Includes is_super_admin -- the only client-side way to know whether
        to show admin-only UI (there's no separate permissions endpoint; this is the
        single source of truth the frontend's permissions.tsx reads from).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: The caller's own user record
      tags:
      - users
  /v1/orgs:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/OrgListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: List the caller's orgs
      tags:
      - orgs
    post:
      consumes:
      - application/json
      description: Also creates the org's mirrored listmonk Organization (see internal/provisioning.createListmonkOrganization).
      parameters:
      - description: Org to create
        in: body
        name: org
        required: true
        schema:
          $ref: '#/definitions/httpapi.createOrgRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/OrgResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create an additional org
      tags:
      - orgs
  /v1/orgs/{orgID}/instances:
    get:
      parameters:
      - description: Org ID
        in: path
        name: orgID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/InstanceListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: List an org's instances
      tags:
      - instances
    post:
      consumes:
      - application/json
      description: Provisions a real tenant via the listmonk fork's Operator API,
        synchronously (see docs/plan.md's Provisioning state machine section). include_postmark
        defaults to true if omitted.
      parameters:
      - description: Org ID
        in: path
        name: orgID
        required: true
        type: string
      - description: Instance to create
        in: body
        name: instance
        required: true
        schema:
          $ref: '#/definitions/httpapi.createInstanceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/InstanceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Slug already in use
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create an instance
      tags:
      - instances
  /v1/orgs/{orgID}/instances/{instanceID}:
    delete:
      description: Permanently deletes the instance's Postmark server (if any), its
        Cloudflare custom domain (if any), its listmonk tenant (subscribers, campaigns,
        users, settings -- everything), and its record here. Irreversible.
      parameters:
      - description: Org ID
        in: path
        name: orgID
        required: true
        type: string
      - description: Instance ID
        in: path
        name: instanceID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete an instance
      tags:
      - instances
    get:
      parameters:
      - description: Org ID
        in: path
        name: orgID
        required: true
        type: string
      - description: Instance ID
        in: path
        name: instanceID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/InstanceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get instance detail
      tags:
      - instances
  /v1/orgs/{orgID}/instances/{instanceID}/custom-domain:
    delete:
      description: Reverts the tenant's URL back to {slug}.{root_domain}, then removes
        the DNS records stored for it (and the Cloudflare Custom Hostname, if one
        was ever created). Irreversible.
      parameters:
      - description: Org ID
        in: path
        name: orgID
        required: true
        type: string
      - description: Instance ID
        in: path
        name: instanceID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: No custom domain yet
          schema:
            $ref: '#/definitions/ErrorResponse'
        "501":
          description: Cloudflare not configured
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete an instance's custom domain
      tags:
      - instances
    get:
      description: Returns the custom domain the org added, plus the DNS records to
        publish for it. 404 if none added yet. Re-checks live if still pending and
        flips the tenant's URL over once verified -- currently a plain DNS CNAME check
        (no certificate is issued yet; the domain is not yet served over HTTPS, see
        docs/custom-domains.md).
      parameters:
      - description: Org ID
        in: path
        name: orgID
        required: true
        type: string
      - description: Instance ID
        in: path
        name: instanceID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/CustomDomainResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: No custom domain yet
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get an instance's custom domain
      tags:
      - instances
    post:
      consumes:
      - application/json
      description: Returns the CNAME record to publish (at our fallback origin) for
        domain. The org's own DNS doesn't need to be on Cloudflare. No certificate
        is issued yet -- see docs/custom-domains.md for why. 409 if the instance already
        has one, or if the domain is already claimed by another workspace.
      parameters:
      - description: Org ID
        in: path
        name: orgID
        required: true
        type: string
      - description: Instance ID
        in: path
        name: instanceID
        required: true
        type: string
      - description: Domain to add
        in: body
        name: domain
        required: true
        schema:
          $ref: '#/definitions/httpapi.addCustomDomainRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/CustomDomainResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Already added, or already claimed by another workspace
          schema:
            $ref: '#/definitions/ErrorResponse'
        "501":
          description: Cloudflare not configured
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Add an instance's custom domain
      tags:
      - instances
  /v1/orgs/{orgID}/instances/{instanceID}/events:
    get:
      description: Maps to provisioning_jobs; backs the dashboard's provisioning-status
        UI.
      parameters:
      - description: Org ID
        in: path
        name: orgID
        required: true
        type: string
      - description: Instance ID
        in: path
        name: instanceID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ProvisioningJobListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Provisioning timeline for an instance
      tags:
      - instances
  /v1/orgs/{orgID}/instances/{instanceID}/postmark-server:
    delete:
      description: Removes the Postmark server without touching the instance/tenant
        itself -- the instance is left without email sending until re-provisioned.
        Irreversible.
      parameters:
      - description: Org ID
        in: path
        name: orgID
        required: true
        type: string
      - description: Instance ID
        in: path
        name: instanceID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Instance has no Postmark server
          schema:
            $ref: '#/definitions/ErrorResponse'
        "501":
          description: Postmark not configured
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete an instance's Postmark server
      tags:
      - instances
    get:
      description: Locally-stored info plus live state from Postmark (name, whether
        SMTP sending is activated). Never includes the API token.
      parameters:
      - description: Org ID
        in: path
        name: orgID
        required: true
        type: string
      - description: Instance ID
        in: path
        name: instanceID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/PostmarkServerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Instance has no Postmark server
          schema:
            $ref: '#/definitions/ErrorResponse'
        "501":
          description: Postmark not configured
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get an instance's Postmark server
      tags:
      - instances
  /v1/orgs/{orgID}/instances/{instanceID}/postmark-server/resync:
    post:
      description: Fixes drift if the tenant's SMTP config was reset or changed by
        hand. Requires both a Postmark server and a confirmed sender identity to already
        exist.
      parameters:
      - description: Org ID
        in: path
        name: orgID
        required: true
        type: string
      - description: Instance ID
        in: path
        name: instanceID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: No sender identity yet
          schema:
            $ref: '#/definitions/ErrorResponse'
        "501":
          description: Postmark not configured
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Re-push an instance's Postmark SMTP credentials into listmonk
      tags:
      - instances
  /v1/orgs/{orgID}/instances/{instanceID}/sender-identity:
    delete:
      description: Removes the domain or sender signature from Postmark and locally,
        along with any DNS records published for it. Irreversible. The instance is
        left without a confirmed "from" address until a new identity is added.
      parameters:
      - description: Org ID
        in: path
        name: orgID
        required: true
        type: string
      - description: Instance ID
        in: path
        name: instanceID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: No sender identity yet
          schema:
            $ref: '#/definitions/ErrorResponse'
        "501":
          description: Postmark not configured
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete an instance's sender identity
      tags:
      - instances
    get:
      description: Returns the domain or sender signature the org added, plus any
        DNS records to publish for it (empty for a sender signature). 404 if none
        added yet.
      parameters:
      - description: Org ID
        in: path
        name: orgID
        required: true
        type: string
      - description: Instance ID
        in: path
        name: instanceID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/SenderIdentityResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: No sender identity yet
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get an instance's sender identity
      tags:
      - instances
    post:
      consumes:
      - application/json
      description: Adds exactly one sender identity per instance (an org's own domain,
        a sender signature, or an opt-in subdomain of ours), and pushes the resulting
        SMTP credentials into the listmonk tenant. 409 if the instance already has
        one, or if the domain/email is already claimed by another workspace.
      parameters:
      - description: Org ID
        in: path
        name: orgID
        required: true
        type: string
      - description: Instance ID
        in: path
        name: instanceID
        required: true
        type: string
      - description: Sender identity to add
        in: body
        name: identity
        required: true
        schema:
          $ref: '#/definitions/httpapi.addSenderIdentityRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/SenderIdentityResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Already added, or already claimed by another workspace
          schema:
            $ref: '#/definitions/ErrorResponse'
        "501":
          description: Postmark not configured
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Add an instance's sender identity
      tags:
      - instances
  /v1/orgs/{orgID}/instances/{instanceID}/setup-link:
    post:
      description: Needed because the original link's token is lost on a listmonk
        restart.
      parameters:
      - description: Org ID
        in: path
        name: orgID
        required: true
        type: string
      - description: Instance ID
        in: path
        name: instanceID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/SetupLinkResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Reissue an instance admin's one-time setup link
      tags:
      - instances
  /v1/orgs/{orgID}/members:
    get:
      parameters:
      - description: Org ID
        in: path
        name: orgID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/MemberListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: List an org's members
      tags:
      - members
    post:
      consumes:
      - application/json
      description: Owner-only. Creates the person's Zitadel identity directly if a
        service account is configured (see internal/zitadelmgmt); otherwise returns
        501.
      parameters:
      - description: Org ID
        in: path
        name: orgID
        required: true
        type: string
      - description: Person to invite
        in: body
        name: member
        required: true
        schema:
          $ref: '#/definitions/httpapi.inviteMemberRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: Not an org owner
          schema:
            $ref: '#/definitions/ErrorResponse'
        "501":
          description: Invites not configured
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Invite a person into an org
      tags:
      - members
securityDefinitions:
  BearerAuth:
    description: Bearer token verified against Zitadel's JWKS -- no signup/login endpoints
      of our own, see docs/plan.md's Auth section.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
